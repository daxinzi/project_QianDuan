<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写作空间 - 登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #8b7355;
            --accent-color: #d4a574;
            --bg-color: #f5f3ef;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #6b7c8a;
            --border-color: #e8e4de;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at top left, rgba(139, 115, 85, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(212, 165, 116, 0.08) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.3);
        }

        .logo-icon svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        .logo-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--primary-color);
            letter-spacing: 4px;
        }

        .logo-slogan {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
        }

        .card-header {
            padding: 24px 24px 0;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--secondary-color);
            transform: scaleX(0);
            transition: var(--transition);
        }

        .tab-btn.active {
            color: var(--primary-color);
        }

        .tab-btn.active::after {
            transform: scaleX(1);
        }

        .tab-btn:hover:not(.active) {
            color: var(--primary-color);
        }

        .card-body {
            padding: 24px;
        }

        .form-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-primary);
            transition: var(--transition);
            background: #fafaf8;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--secondary-color);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.1);
        }

        .form-input::placeholder {
            color: #b8c0c8;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input {
            display: none;
        }

        .checkbox-custom {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .remember-me input:checked + .checkbox-custom {
            background: var(--secondary-color);
            border-color: var(--secondary-color);
        }

        .checkbox-custom svg {
            width: 12px;
            height: 12px;
            fill: white;
            opacity: 0;
            transition: var(--transition);
        }

        .remember-me input:checked + .checkbox-custom svg {
            opacity: 1;
        }

        .remember-me span {
            color: var(--text-secondary);
        }

        .forgot-link {
            color: var(--secondary-color);
            text-decoration: none;
            transition: var(--transition);
        }

        .forgot-link:hover {
            color: var(--accent-color);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: var(--transition);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 115, 85, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider span {
            padding: 0 16px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .social-login {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: #fafaf8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
            color: var(--text-secondary);
        }

        .social-btn:hover {
            border-color: var(--secondary-color);
            background: #fff;
        }

        .social-btn svg {
            width: 18px;
            height: 18px;
        }

        .card-footer {
            padding: 16px 24px 24px;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .card-footer a {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--card-bg);
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: #f5f3ef;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--border-color);
        }

        .modal-close svg {
            width: 16px;
            height: 16px;
            fill: var(--text-secondary);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 0 24px 24px;
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-btn-cancel {
            background: #f5f3ef;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .modal-btn-cancel:hover {
            background: var(--border-color);
        }

        .modal-btn-confirm {
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            border: none;
            color: white;
        }

        .modal-btn-confirm:hover {
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.4);
        }

        .verification-code-group {
            display: flex;
            gap: 12px;
        }

        .verification-code-group .form-input {
            flex: 1;
        }

        .send-code-btn {
            padding: 12px 16px;
            background: #f5f3ef;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 13px;
            color: var(--secondary-color);
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }

        .send-code-btn:hover:not(:disabled) {
            background: var(--border-color);
        }

        .send-code-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary-color);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #27ae60;
        }

        .toast.error {
            background: #e74c3c;
        }

        .password-strength {
            margin-top: 8px;
            display: flex;
            gap: 4px;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            transition: var(--transition);
        }

        .strength-bar.active.weak {
            background: #e74c3c;
        }

        .strength-bar.active.medium {
            background: #f39c12;
        }

        .strength-bar.active.strong {
            background: #27ae60;
        }

        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }

            .logo-text {
                font-size: 24px;
            }

            .card-header {
                padding: 20px 20px 0;
            }

            .card-body {
                padding: 20px;
            }

            .form-options {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                </svg>
            </div>
            <div class="logo-text">写作空间</div>
            <div class="logo-slogan">让文字记录思考</div>
        </div>

        <div class="card">
            <div class="card-header">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>

            <div class="card-body">
                <!-- 登录表单 -->
                <div class="form-section active" id="login-form">
                    <div class="form-group">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-input" id="login-email" placeholder="请输入邮箱地址">
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" id="login-password" placeholder="请输入密码">
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember-me">
                            <span class="checkbox-custom">
                                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                            </span>
                            <span>记住我</span>
                        </label>
                        <a href="#" class="forgot-link" id="forgot-password-link">忘记密码？</a>
                    </div>
                    <button class="submit-btn" id="login-btn">登录</button>
                </div>

                <!-- 注册表单 -->
                <div class="form-section" id="register-form">
                    <div class="form-group">
                        <label class="form-label">昵称</label>
                        <input type="text" class="form-input" id="register-username" placeholder="请输入昵称">
                    </div>
                    <div class="form-group">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-input" id="register-email" placeholder="请输入邮箱地址">
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" id="register-password" placeholder="请设置密码（至少8位）">
                        <div class="password-strength">
                            <div class="strength-bar" id="strength-1"></div>
                            <div class="strength-bar" id="strength-2"></div>
                            <div class="strength-bar" id="strength-3"></div>
                            <div class="strength-bar" id="strength-4"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">确认密码</label>
                        <input type="password" class="form-input" id="register-confirm-password" placeholder="请再次输入密码">
                    </div>
                    <button class="submit-btn" id="register-btn">注册</button>
                </div>
            </div>

            <div class="card-footer">
                <span>登录即表示同意</span>
                <a href="#">《用户协议》</a>
                <span>和</span>
                <a href="#">《隐私政策》</a>
            </div>
        </div>
    </div>

    <!-- 忘记密码弹窗 -->
    <div class="modal-overlay" id="forgot-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">找回密码</h3>
                <button class="modal-close" id="modal-close">
                    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="forgot-email" placeholder="请输入注册邮箱">
                </div>
                <div class="form-group">
                    <label class="form-label">验证码</label>
                    <div class="verification-code-group">
                        <input type="text" class="form-input" id="forgot-code" placeholder="请输入验证码">
                        <button class="send-code-btn" id="send-code-btn">发送验证码</button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">新密码</label>
                    <input type="password" class="form-input" id="forgot-new-password" placeholder="请设置新密码">
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-cancel" id="modal-cancel">取消</button>
                <button class="modal-btn modal-btn-confirm" id="modal-confirm">确认重置</button>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <script>
        // 检查是否已登录，若已登录则跳转到首页
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }

        // 读取记住的邮箱
        const rememberedEmail = localStorage.getItem('rememberedEmail');
        if (rememberedEmail) {
            document.getElementById('login-email').value = rememberedEmail;
            document.getElementById('remember-me').checked = true;
        }

        // Tab 切换
        const tabBtns = document.querySelectorAll('.tab-btn');
        const formSections = document.querySelectorAll('.form-section');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                formSections.forEach(section => {
                    section.classList.remove('active');
                    if (section.id === `${tab}-form`) {
                        section.classList.add('active');
                    }
                });
            });
        });

        // 密码强度检测
        const registerPassword = document.getElementById('register-password');
        const strengthBars = [
            document.getElementById('strength-1'),
            document.getElementById('strength-2'),
            document.getElementById('strength-3'),
            document.getElementById('strength-4')
        ];

        registerPassword.addEventListener('input', () => {
            const password = registerPassword.value;
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password) && /[^a-zA-Z0-9]/.test(password)) strength++;
            
            strengthBars.forEach((bar, index) => {
                bar.className = 'strength-bar';
                if (index < strength) {
                    bar.classList.add('active');
                    if (strength <= 1) bar.classList.add('weak');
                    else if (strength <= 2) bar.classList.add('medium');
                    else bar.classList.add('strong');
                }
            });
        });

        // 弹窗控制
        const forgotModal = document.getElementById('forgot-modal');
        const forgotLink = document.getElementById('forgot-password-link');
        const modalClose = document.getElementById('modal-close');
        const modalCancel = document.getElementById('modal-cancel');

        forgotLink.addEventListener('click', (e) => {
            e.preventDefault();
            forgotModal.classList.add('active');
        });

        modalClose.addEventListener('click', () => {
            forgotModal.classList.remove('active');
        });

        modalCancel.addEventListener('click', () => {
            forgotModal.classList.remove('active');
        });

        forgotModal.addEventListener('click', (e) => {
            if (e.target === forgotModal) {
                forgotModal.classList.remove('active');
            }
        });

        // 发送验证码倒计时
        const sendCodeBtn = document.getElementById('send-code-btn');
        let countdown = 0;

        sendCodeBtn.addEventListener('click', () => {
            const email = document.getElementById('forgot-email').value;
            
            if (!email) {
                showToast('请输入邮箱地址', 'error');
                return;
            }
            
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast('请输入有效的邮箱地址', 'error');
                return;
            }

            countdown = 60;
            sendCodeBtn.disabled = true;
            
            const timer = setInterval(() => {
                countdown--;
                sendCodeBtn.textContent = `${countdown}秒后重发`;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = '发送验证码';
                }
            }, 1000);

            showToast('验证码已发送到您的邮箱', 'success');
        });

        // Toast 提示
        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            
            setTimeout(() => {
                toast.classList.add('show');
            }, 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 登录
        document.getElementById('login-btn').addEventListener('click', () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const remember = document.getElementById('remember-me').checked;

            if (!email || !password) {
                showToast('请填写完整信息', 'error');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast('请输入有效的邮箱地址', 'error');
                return;
            }

            // 保存登录状态
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userInfo', JSON.stringify({
                username: email.split('@')[0],
                email: email
            }));
            
            // 记住密码功能
            if (remember) {
                localStorage.setItem('rememberedEmail', email);
            } else {
                localStorage.removeItem('rememberedEmail');
            }

            showToast('登录成功！欢迎回来~', 'success');
            
            // 跳转到首页
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        });

        // 注册
        document.getElementById('register-btn').addEventListener('click', () => {
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;

            if (!username || !email || !password || !confirmPassword) {
                showToast('请填写完整信息', 'error');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast('请输入有效的邮箱地址', 'error');
                return;
            }

            if (password.length < 8) {
                showToast('密码长度至少8位', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('两次密码输入不一致', 'error');
                return;
            }

            // 自动登录并保存用户信息
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userInfo', JSON.stringify({
                username: username,
                email: email
            }));

            showToast('注册成功！即将进入首页~', 'success');
            
            // 跳转到首页
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        });

        // 重置密码
        document.getElementById('modal-confirm').addEventListener('click', () => {
            const email = document.getElementById('forgot-email').value;
            const code = document.getElementById('forgot-code').value;
            const newPassword = document.getElementById('forgot-new-password').value;

            if (!email || !code || !newPassword) {
                showToast('请填写完整信息', 'error');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast('请输入有效的邮箱地址', 'error');
                return;
            }

            if (newPassword.length < 8) {
                showToast('密码长度至少8位', 'error');
                return;
            }

            showToast('密码重置成功！请使用新密码登录', 'success');
            forgotModal.classList.remove('active');
        });

        // 回车键提交
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const form = input.closest('.form-section');
                    if (form.id === 'login-form') {
                        document.getElementById('login-btn').click();
                    } else if (form.id === 'register-form') {
                        document.getElementById('register-btn').click();
                    }
                }
            });
        });
    </script>
</body>
</html>
