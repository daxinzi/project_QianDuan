<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #8b7355;
            --accent-color: #d4a574;
            --bg-color: #f5f3ef;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #6b7c8a;
            --border-color: #e8e4de;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at top left, rgba(139, 115, 85, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(212, 165, 116, 0.08) 0%, transparent 50%);
        }

        .container { width: 100%; max-width: 420px; }

        .logo { text-align: center; margin-bottom: 32px; }

        .logo-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.3);
        }

        .logo-icon svg { width: 36px; height: 36px; fill: white; }

        .logo-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--primary-color);
            letter-spacing: 4px;
        }

        .logo-slogan { font-size: 13px; color: var(--text-secondary); margin-top: 8px; letter-spacing: 2px; }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-header {
            padding: 24px 24px 0;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            transition: var(--transition);
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--secondary-color);
            transform: scaleX(0);
            transition: var(--transition);
        }

        .tab-btn.active { color: var(--primary-color); }
        .tab-btn.active::after { transform: scaleX(1); }
        .tab-btn:hover:not(.active) { color: var(--primary-color); }

        .card-body { padding: 24px; }

        .form-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-primary);
            transition: var(--transition);
            background: #fafaf8;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--secondary-color);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.1);
        }

        .form-input::placeholder { color: #b8c0c8; }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input { display: none; }

        .checkbox-custom {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .remember-me input:checked + .checkbox-custom {
            background: var(--secondary-color);
            border-color: var(--secondary-color);
        }

        .checkbox-custom svg {
            width: 12px;
            height: 12px;
            fill: white;
            opacity: 0;
            transition: var(--transition);
        }

        .remember-me input:checked + .checkbox-custom svg { opacity: 1; }
        .remember-me span { color: var(--text-secondary); }

        .forgot-link {
            color: var(--secondary-color);
            text-decoration: none;
            transition: var(--transition);
        }

        .forgot-link:hover { color: var(--accent-color); }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: var(--transition);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 115, 85, 0.4);
        }

        .password-strength { margin-top: 8px; display: flex; gap: 4px; }

        .strength-bar {
            flex: 1;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            transition: var(--transition);
        }

        .strength-bar.active.weak { background: #e74c3c; }
        .strength-bar.active.medium { background: #f39c12; }
        .strength-bar.active.strong { background: #27ae60; }

        .card-footer {
            padding: 16px 24px 24px;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .card-footer a { color: var(--secondary-color); text-decoration: none; font-weight: 500; }
        .card-footer a:hover { text-decoration: underline; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--card-bg);
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
        }

        .modal-overlay.active .modal { transform: scale(1) translateY(0); }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: #f5f3ef;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .modal-close:hover { background: var(--border-color); }
        .modal-close svg { width: 16px; height: 16px; fill: var(--text-secondary); }

        .modal-body { padding: 24px; }

        .modal-footer {
            padding: 0 24px 24px;
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-btn-cancel {
            background: #f5f3ef;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .modal-btn-confirm {
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            border: none;
            color: white;
        }

        .verification-code-group { display: flex; gap: 12px; }
        .verification-code-group .form-input { flex: 1; }

        .send-code-btn {
            padding: 12px 16px;
            background: #f5f3ef;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 13px;
            color: var(--secondary-color);
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }

        .send-code-btn:hover:not(:disabled) { background: var(--border-color); }
        .send-code-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary-color);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }

        @media (max-width: 480px) {
            .container { max-width: 100%; }
            .logo-text { font-size: 24px; }
            .card-header { padding: 20px 20px 0; }
            .card-body { padding: 20px; }
            .form-options { flex-direction: column; gap: 12px; align-items: flex-start; }
        }
    </style>
</head>

    <script>
        // IndexedDB жХ∞жНЃеЇУе∞Би£Е
        const DB_NAME = 'WritingSpaceDB';
        const DB_VERSION = 1;
        const STORE_USERS = 'users';
        const STORE_ARTICLES = 'articles';

        class Database {
            constructor() {
                this.db = null;
            }

            async open() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);

                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve(this.db);
                    };

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        
                        // еИЫеїЇзФ®жИЈе≠ШеВ®еЇУ
                        if (!db.objectStoreNames.contains(STORE_USERS)) {
                            const userStore = db.createObjectStore(STORE_USERS, { keyPath: 'id', autoIncrement: true });
                            userStore.createIndex('email', 'email', { unique: true });
                            userStore.createIndex('username', 'username', { unique: false });
                        }

                        // еИЫеїЇжЦЗзЂ†е≠ШеВ®еЇУ
                        if (!db.objectStoreNames.contains(STORE_ARTICLES)) {
                            const articleStore = db.createObjectStore(STORE_ARTICLES, { keyPath: 'id', autoIncrement: true });
                            articleStore.createIndex('authorId', 'authorId', { unique: false });
                            articleStore.createIndex('status', 'status', { unique: false });
                        }
                    };
                });
            }

            async getAll(storeName) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readonly');
                    const store = transaction.objectStore(storeName);
                    const request = store.getAll();
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                });
            }

            async getByIndex(storeName, indexName, value) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readonly');
                    const store = transaction.objectStore(storeName);
                    const index = store.index(indexName);
                    const request = index.get(value);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                });
            }

            async add(storeName, data) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.add(data);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                });
            }

            async put(storeName, data) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.put(data);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                });
            }

            async delete(storeName, id) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.delete(id);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                });
            }
        }

        // еЕ®е±АжХ∞жНЃеЇУеЃЮдЊЛ
        const db = new Database();
        let dbInitialized = false;

        // еИЭеІЛеМЦжХ∞жНЃеЇУ
        async function initDatabase() {
            if (dbInitialized) return;
            try {
                await db.open();
                dbInitialized = true;
                
                // еИЭеІЛеМЦйїШиЃ§зФ®жИЈжХ∞жНЃ
                const users = await db.getAll(STORE_USERS);
                if (users.length === 0) {
                    await db.add(STORE_USERS, {
                        username: 'зЃ°зРЖеСШ',
                        email: 'admin@example.com',
                        password: 'admin123',
                        avatar: 'зЃ°',
                        role: 'admin',
                        articles: 0,
                        status: 'normal',
                        date: new Date().toISOString().split('T')[0]
                    });
                    await db.add(STORE_USERS, {
                        username: 'жЮЧйЧій£Ое£∞',
                        email: 'lin@example.com',
                        password: '123456',
                        avatar: 'жЮЧ',
                        role: 'user',
                        articles: 12,
                        status: 'normal',
                        date: '2024-01-15'
                    });
                    await db.add(STORE_USERS, {
                        username: 'еҐ®жЯУжµБеєі',
                        email: 'mo@example.com',
                        password: '123456',
                        avatar: 'еҐ®',
                        role: 'user',
                        articles: 8,
                        status: 'normal',
                        date: '2024-02-20'
                    });
                }
            } catch (error) {
                console.error('жХ∞жНЃеЇУеИЭеІЛеМЦе§±иі•:', error);
            }
        }

        // ж£АжЯ•жШѓеР¶еЈ≤зЩїељХ
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }

        // иѓїеПЦиЃ∞дљПзЪДйВЃзЃ±
        const rememberedEmail = localStorage.getItem('rememberedEmail');
        if (rememberedEmail) {
            document.getElementById('login-email').value = rememberedEmail;
            document.getElementById('remember-me').checked = true;
        }

        // Tab еИЗжНҐ
        const tabBtns = document.querySelectorAll('.tab-btn');
        const formSections = document.querySelectorAll('.form-section');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                formSections.forEach(section => {
                    section.classList.remove('active');
                    if (section.id === `${tab}-form`) section.classList.add('active');
                });
            });
        });

        // еѓЖз†БеЉЇеЇ¶ж£АжµЛ
        const registerPassword = document.getElementById('register-password');
        const strengthBars = [
            document.getElementById('strength-1'),
            document.getElementById('strength-2'),
            document.getElementById('strength-3'),
            document.getElementById('strength-4')
        ];

        registerPassword.addEventListener('input', () => {
            const password = registerPassword.value;
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password) && /[^a-zA-Z0-9]/.test(password)) strength++;
            
            strengthBars.forEach((bar, index) => {
                bar.className = 'strength-bar';
                if (index < strength) {
                    bar.classList.add('active');
                    if (strength <= 1) bar.classList.add('weak');
                    else if (strength <= 2) bar.classList.add('medium');
                    else bar.classList.add('strong');
                }
            });
        });

        // еЉєз™ЧжОІеИґ
        const forgotModal = document.getElementById('forgot-modal');
        const forgotLink = document.getElementById('forgot-password-link');

        forgotLink.addEventListener('click', (e) => { e.preventDefault(); forgotModal.classList.add('active'); });
        document.getElementById('modal-close').addEventListener('click', () => forgotModal.classList.remove('active'));
        document.getElementById('modal-cancel').addEventListener('click', () => forgotModal.classList.remove('active'));
        forgotModal.addEventListener('click', (e) => { if (e.target === forgotModal) forgotModal.classList.remove('active'); });

        // еПСйАБй™МиѓБз†БеАТиЃ°жЧґ
        const sendCodeBtn = document.getElementById('send-code-btn');
        let countdown = 0;

        sendCodeBtn.addEventListener('click', () => {
            const email = document.getElementById('forgot-email').value;
            if (!email) { showToast('иѓЈиЊУеЕ•йВЃзЃ±еЬ∞еЭА', 'error'); return; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('иѓЈиЊУеЕ•жЬЙжХИзЪДйВЃзЃ±еЬ∞еЭА', 'error'); return; }

            countdown = 60;
            sendCodeBtn.disabled = true;
            const timer = setInterval(() => {
                countdown--;
                sendCodeBtn.textContent = `${countdown}зІТеРОйЗНеПС`;
                if (countdown <= 0) {
                    clearInterval(timer);
                    sendCodeBtn.disabled = false;
                    sendCodeBtn.textContent = 'еПСйАБй™МиѓБз†Б';
                }
            }, 1000);
            showToast('й™МиѓБз†БеЈ≤еПСйАБеИ∞жВ®зЪДйВЃзЃ±пЉИж®°жЛЯпЉЙ', 'success');
        });

        // Toast
        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // зЩїељХ
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const remember = document.getElementById('remember-me').checked;

            if (!email || !password) { showToast('иѓЈе°ЂеЖЩеЃМжХідњ°жБѓ', 'error'); return; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('иѓЈиЊУеЕ•жЬЙжХИзЪДйВЃзЃ±еЬ∞еЭА', 'error'); return; }

            await initDatabase();
            
            try {
                const user = await db.getByIndex(STORE_USERS, 'email', email);
                if (!user || user.password !== password) {
                    showToast('йВЃзЃ±жИЦеѓЖз†БйФЩиѓѓ', 'error');
                    return;
                }
                if (user.status === 'disabled') {
                    showToast('иі¶еПЈеЈ≤иҐЂз¶БзФ®', 'error');
                    return;
                }

                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userInfo', JSON.stringify({
                    id: user.id,
                    username: user.username,
                    email: user.email,
                    role: user.role
                }));

                if (remember) localStorage.setItem('rememberedEmail', email);
                else localStorage.removeItem('rememberedEmail');

                showToast('зЩїељХжИРеКЯпЉБжђҐињОеЫЮжЭ•~', 'success');
                setTimeout(() => window.location.href = 'index.html', 1000);
            } catch (error) {
                showToast('зЩїељХе§±иі•: ' + error.message, 'error');
            }
        });

        // ж≥®еЖМ
        document.getElementById('register-btn').addEventListener('click', async () => {
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;

            if (!username || !email || !password || !confirmPassword) { showToast('иѓЈе°ЂеЖЩеЃМжХідњ°жБѓ', 'error'); return; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('иѓЈиЊУеЕ•жЬЙжХИзЪДйВЃзЃ±еЬ∞еЭА', 'error'); return; }
            if (password.length < 8) { showToast('еѓЖз†БйХњеЇ¶иЗ≥е∞С8дљН', 'error'); return; }
            if (password !== confirmPassword) { showToast('дЄ§жђ°еѓЖз†БиЊУеЕ•дЄНдЄАиЗі', 'error'); return; }

            await initDatabase();

            try {
                const existingUser = await db.getByIndex(STORE_USERS, 'email', email);
                if (existingUser) {
                    showToast('иѓ•йВЃзЃ±еЈ≤иҐЂж≥®еЖМ', 'error');
                    return;
                }

                const newUser = {
                    username: username,
                    email: email,
                    password: password,
                    avatar: username.charAt(0).toUpperCase(),
                    role: 'user',
                    articles: 0,
                    status: 'normal',
                    date: new Date().toISOString().split('T')[0]
                };

                await db.add(STORE_USERS, newUser);

                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userInfo', JSON.stringify({
                    username: username,
                    email: email,
                    role: 'user'
                }));

                showToast('ж≥®еЖМжИРеКЯпЉБеН≥е∞ЖињЫеЕ•й¶Цй°µ~', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } catch (error) {
                showToast('ж≥®еЖМе§±иі•: ' + error.message, 'error');
            }
        });

        // йЗНзљЃеѓЖз†Б
        document.getElementById('modal-confirm').addEventListener('click', async () => {
            const email = document.getElementById('forgot-email').value;
            const code = document.getElementById('forgot-code').value;
            const newPassword = document.getElementById('forgot-new-password').value;

            if (!email || !code || !newPassword) { showToast('иѓЈе°ЂеЖЩеЃМжХідњ°жБѓ', 'error'); return; }
            if (newPassword.length < 8) { showToast('еѓЖз†БйХњеЇ¶иЗ≥е∞С8дљН', 'error'); return; }

            await initDatabase();

            try {
                const user = await db.getByIndex(STORE_USERS, 'email', email);
                if (!user) {
                    showToast('иѓ•йВЃзЃ±жЬ™ж≥®еЖМ', 'error');
                    return;
                }

                user.password = newPassword;
                await db.put(STORE_USERS, user);

                showToast('еѓЖз†БйЗНзљЃжИРеКЯпЉБиѓЈдљњзФ®жЦ∞еѓЖз†БзЩїељХ', 'success');
                forgotModal.classList.remove('active');
            } catch (error) {
                showToast('еѓЖз†БйЗНзљЃе§±иі•: ' + error.message, 'error');
            }
        });

        // еЫЮиљ¶йФЃжПРдЇ§
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const form = input.closest('.form-section');
                    if (form.id === 'login-form') document.getElementById('login-btn').click();
                    else if (form.id === 'register-form') document.getElementById('register-btn').click();
                }
            });
        });
    </script>
</body>
</html>
