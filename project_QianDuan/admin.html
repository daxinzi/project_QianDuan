<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 写作空间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #8b7355;
            --accent-color: #d4a574;
            --bg-color: #f5f3ef;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #6b7c8a;
            --border-color: #e8e4de;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: 240px;
            background: var(--primary-color);
            color: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-logo {
            font-family: 'Noto Serif SC', serif;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-logo-icon svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .sidebar-menu {
            flex: 1;
            padding: 16px 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            transition: var(--transition);
            cursor: pointer;
        }

        .menu-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .menu-item.active {
            background: rgba(255,255,255,0.15);
            color: white;
            border-left: 3px solid var(--accent-color);
        }

        .menu-item svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .menu-item .badge {
            margin-left: auto;
            background: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .back-to-site {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 13px;
            transition: var(--transition);
        }

        .back-to-site:hover {
            color: white;
        }

        .back-to-site svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            overflow-y: auto;
        }

        .top-bar {
            background: var(--card-bg);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .top-bar-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        .admin-name {
            font-size: 14px;
            color: var(--text-primary);
        }

        .admin-role {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .content {
            padding: 32px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon svg {
            width: 28px;
            height: 28px;
        }

        .stat-icon.users { background: #e3f2fd; }
        .stat-icon.users svg { fill: #1e88e5; }
        .stat-icon.articles { background: #e8f5e9; }
        .stat-icon.articles svg { fill: #43a047; }
        .stat-icon.comments { background: #fff3e0; }
        .stat-icon.comments svg { fill: #fb8c00; }
        .stat-icon.views { background: #f3e5f5; }
        .stat-icon.views svg { fill: #8e24aa; }

        .stat-info h3 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stat-info p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 数据表格 */
        .data-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .data-card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .data-card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .data-card-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn svg {
            width: 16px;
            height: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.4);
        }

        .btn-secondary {
            background: var(--bg-color);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .btn-danger {
            background: #fee;
            color: #e74c3c;
        }

        .btn-danger:hover {
            background: #fdd;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            padding: 14px 24px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            background: #fafaf8;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table td {
            padding: 16px 24px;
            font-size: 14px;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
        }

        .data-table tr:hover td {
            background: #fafaf8;
        }

        .table-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .table-user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        .table-user-info h4 {
            font-size: 14px;
            font-weight: 500;
        }

        .table-user-info p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-badge {
            display: inline-flex;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.normal {
            background: #e8f5e9;
            color: #43a047;
        }

        .status-badge.warning {
            background: #fff3e0;
            color: #fb8c00;
        }

        .status-badge.danger {
            background: #fee;
            color: #e74c3c;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-color);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .action-btn:hover {
            background: var(--border-color);
        }

        .action-btn svg {
            width: 16px;
            height: 16px;
            fill: var(--text-secondary);
        }

        .action-btn.edit:hover svg { fill: #1e88e5; }
        .action-btn.delete:hover { background: #fee; }
        .action-btn.delete:hover svg { fill: #e74c3c; }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
        }

        .pagination-info {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .pagination-btns {
            display: flex;
            gap: 8px;
        }

        .page-btn {
            min-width: 32px;
            height: 32px;
            padding: 0 12px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-btn:hover, .page-btn.active {
            background: var(--secondary-color);
            border-color: var(--secondary-color);
            color: white;
        }

        /* 图表区域 */
        .chart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .chart-bars {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 200px;
            gap: 12px;
        }

        .chart-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
        }

        .chart-bar {
            width: 100%;
            background: linear-gradient(to top, var(--secondary-color), var(--accent-color));
            border-radius: 6px 6px 0 0;
            transition: var(--transition);
            margin-top: auto;
        }

        .chart-bar:hover {
            opacity: 0.8;
        }

        .chart-bar-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .chart-bar-value {
            font-size: 12px;
            font-weight: 500;
            color: var(--primary-color);
            margin-bottom: 4px;
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .activity-item {
            display: flex;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .activity-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .activity-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .activity-icon svg {
            width: 18px;
            height: 18px;
        }

        .activity-icon.article { background: #e3f2fd; }
        .activity-icon.article svg { fill: #1e88e5; }
        .activity-icon.user { background: #e8f5e9; }
        .activity-icon.user svg { fill: #43a047; }
        .activity-icon.comment { background: #fff3e0; }
        .activity-icon.comment svg { fill: #fb8c00; }

        .activity-content p {
            font-size: 13px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .activity-content span {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            transform: scale(0.9);
            transition: var(--transition);
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-color);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close svg {
            width: 16px;
            height: 16px;
            fill: var(--text-secondary);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-primary);
            transition: var(--transition);
            background: #fafaf8;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--secondary-color);
            background: white;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary-color);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }

        @media (max-width: 1024px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .content {
                padding: 16px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .data-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">
                        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    </div>
                    写作空间
                </div>
            </div>
            <nav class="sidebar-menu">
                <a class="menu-item active" data-page="dashboard">
                    <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                    控制台
                </a>
                <a class="menu-item" data-page="articles">

                    文章管理
                </a>
                <a class="menu-item" data-page="users">
                    <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>

                    评论管理
                    <span class="badge">12</span>
                </a>
                <a class="menu-item" data-page="categories">
                    <svg viewBox="0 0 24 24"><path d="M12 2l-5.5 9h11z"/><circle cx="17.5" cy="17.5" r="4.5"/><path d="M3 13.5h8v8H3z"/></svg>
                    分类管理
                </a>
                <a class="menu-item" data-page="system">

                    系统设置
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="back-to-site">
                    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                    返回前台
                </a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="top-bar">
                <h1 class="top-bar-title" id="page-title">控制台</h1>
                <div class="top-bar-actions">
                    <div class="admin-info">
                        <div class="admin-avatar">管</div>
                        <div>
                            <div class="admin-name">管理员</div>
                            <div class="admin-role">超级管理员</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="content" id="content">
                <!-- 控制台内容 -->
            </div>
        </main>
    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">编辑</h3>
                <button class="modal-close" id="modal-close">
                    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>

        const DB_NAME = 'WritingSpaceDB';
        const DB_VERSION = 1;
        const STORE_USERS = 'users';
        const STORE_ARTICLES = 'articles';

        class Database {
            constructor() { this.db = null; }

            async open() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => { this.db = request.result; resolve(this.db); };

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains(STORE_USERS)) {
                            const userStore = db.createObjectStore(STORE_USERS, { keyPath: 'id', autoIncrement: true });
                            userStore.createIndex('email', 'email', { unique: true });
                            userStore.createIndex('username', 'username', { unique: false });
                        }
                        if (!db.objectStoreNames.contains(STORE_ARTICLES)) {
                            const articleStore = db.createObjectStore(STORE_ARTICLES, { keyPath: 'id', autoIncrement: true });
                            articleStore.createIndex('authorId', 'authorId', { unique: false });
                            articleStore.createIndex('status', 'status', { unique: false });
                        }
                    };
                });
            }

            async getAll(storeName) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readonly');
                    const store = transaction.objectStore(storeName);
                    const request = store.getAll();
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                });
            }

            async getById(storeName, id) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readonly');
                    const store = transaction.objectStore(storeName);
                    const request = store.get(id);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                });
            }

            async getByIndex(storeName, indexName, value) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readonly');
                    const store = transaction.objectStore(storeName);
                    const index = store.index(indexName);
                    const request = index.get(value);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                });
            }

            async add(storeName, data) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.add(data);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                });
            }

            async put(storeName, data) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.put(data);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                });
            }

            async delete(storeName, id) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(storeName, 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.delete(id);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                });
            }
        }

        let dbInitialized = false;

            }
        };

        };

        // 页面切换
        async function switchPage(page) {
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.toggle('active', item.dataset.page === page);
            });
            
            const data = pageData[page];
            document.getElementById('page-title').textContent = data.title;
            document.getElementById('content').innerHTML = await data.render();
            
            // 绑定用户管理事件
            if (page === 'users') {
                bindUserEvents();
            }
        }

        // 用户管理事件绑定
        function bindUserEvents() {
            // 添加用户
            document.getElementById('add-user-btn')?.addEventListener('click', () => {
                modalMode = 'add';
                showModal('添加用户', `
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-input" id="user-username" placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-input" id="user-email" placeholder="请输入邮箱">
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" id="user-password" placeholder="请输入密码">
                    </div>
                    <div class="form-group">
                        <label class="form-label">状态</label>
                        <select class="form-select" id="user-status">
                            <option value="normal">正常</option>
                            <option value="warning">警告</option>
                            <option value="disabled">禁用</option>
                        </select>
                    </div>
                `);
            });

            // 编辑/禁用/删除用户
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    if (!id) return;

                    if (btn.classList.contains('edit')) {
                        // 编辑用户
                        const users = getUsers();
                        const user = users.find(u => u.id === id);
                        if (user) {
                            modalMode = 'edit';
                            editingUserId = id;
                            showModal('编辑用户', `
                                <div class="form-group">
                                    <label class="form-label">用户名</label>
                                    <input type="text" class="form-input" id="user-username" value="${user.username}">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">邮箱</label>
                                    <input type="email" class="form-input" id="user-email" value="${user.email}">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">新密码（留空不修改）</label>
                                    <input type="password" class="form-input" id="user-password" placeholder="请输入新密码">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">状态</label>
                                    <select class="form-select" id="user-status">
                                        <option value="normal" ${user.status === 'normal' ? 'selected' : ''}>正常</option>
                                        <option value="warning" ${user.status === 'warning' ? 'selected' : ''}>警告</option>
                                        <option value="disabled" ${user.status === 'disabled' ? 'selected' : ''}>禁用</option>
                                    </select>
                                </div>
                            `);
                        }
                    } else if (btn.classList.contains('delete')) {
                        // 删除用户
                        if (confirm('确定要删除该用户吗？')) {
                            deleteUser(id);
                            showToast('用户已删除', 'success');
                            switchPage('users');
                        }
                    } else {
                        // 启用/禁用用户
                        const users = getUsers();
                        const user = users.find(u => u.id === id);
                        if (user) {
                            const newStatus = user.status === 'disabled' ? 'normal' : 'disabled';
                            updateUser(id, { status: newStatus });
                            showToast(newStatus === 'disabled' ? '用户已禁用' : '用户已启用', 'success');
                            switchPage('users');
                        }
                    }
                });
            });

            // 弹窗确认按钮
            document.getElementById('modal-confirm').onclick = async () => {
                const username = document.getElementById('user-username')?.value;
                const email = document.getElementById('user-email')?.value;
                const password = document.getElementById('user-password')?.value;
                const status = document.getElementById('user-status')?.value;

                if (!username || !email) {
                    showToast('请填写完整信息', 'error');
                    return;
                }

                if (modalMode === 'add') {
                    const users = await getUsers();
                    if (users.some(u => u.email === email)) {
                        showToast('该邮箱已被注册', 'error');
                        return;
                    }
                    
                    const newUser = {
                        username: username,
                        email: email,
                        password: password || '123456',
                        avatar: username.charAt(0).toUpperCase(),
                        articles: 0,
                        status: status,
                        date: new Date().toISOString().split('T')[0]
                    };
                    await addUser(newUser);
                    showToast('用户添加成功', 'success');
                } else if (modalMode === 'edit' && editingUserId) {
                    const updateData = {
                        username: username,
                        email: email,
                        status: status
                    };
                    if (password) {
                        updateData.password = password;
                    }
                    await updateUser(editingUserId, updateData);
                    showToast('用户更新成功', 'success');
                }

                hideModal();
                await switchPage('users');
            };
        }

        // 菜单点击
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                switchPage(item.dataset.page);
            });
        });

        // 初始化
        switchPage('dashboard');
    </script>
</body>
</html>
