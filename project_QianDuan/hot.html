<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全站热文 - 写作空间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #8b7355;
            --accent-color: #d4a574;
            --bg-color: #f5f3ef;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #6b7c8a;
            --border-color: #e8e4de;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at top right, rgba(139, 115, 85, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at bottom left, rgba(212, 165, 116, 0.06) 0%, transparent 50%);
        }

        .navbar {
            background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .nav-logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-logo-icon svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .nav-logo-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-item {
            padding: 8px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .nav-item:hover {
            background: var(--bg-color);
            color: var(--primary-color);
        }

        .nav-item.active {
            background: var(--bg-color);
            color: var(--secondary-color);
            font-weight: 500;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-menu { position: relative; }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .user-avatar:hover { transform: scale(1.05); }

        .user-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
            min-width: 180px;
            padding: 8px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: var(--transition);
        }

        .user-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            color: var(--text-secondary);
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            background: none;
            width: 100%;
            text-decoration: none;
        }

        .dropdown-item:hover {
            background: var(--bg-color);
            color: var(--primary-color);
        }

        .dropdown-item svg {
            width: 18px;
            height: 18px;
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border-color);
            margin: 8px 0;
        }

        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .hot-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            margin-left: 12px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--secondary-color);
            border-color: var(--secondary-color);
            color: white;
        }

        .article-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .article-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            gap: 20px;
        }

        .article-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .article-rank {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 60px;
            font-family: 'Noto Serif SC', serif;
        }

        .rank-number {
            font-size: 32px;
            font-weight: 700;
            line-height: 1;
        }

        .rank-number.top1 { color: #e74c3c; }
        .rank-number.top2 { color: #e67e22; }
        .rank-number.top3 { color: #f39c12; }
        .rank-number.other { color: var(--text-secondary); }

        .rank-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .article-content {
            flex: 1;
        }

        .article-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .article-tag {
            padding: 4px 10px;
            background: var(--bg-color);
            color: var(--secondary-color);
            border-radius: 12px;
            font-size: 12px;
        }

        .article-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .article-excerpt {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .article-meta-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .article-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .article-meta-item svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .article-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .article-action-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: var(--bg-color);
            border: none;
            border-radius: 16px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
        }

        .article-action-btn:hover {
            background: var(--secondary-color);
            color: white;
        }

        .article-action-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: var(--bg-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--text-secondary);
        }

        .empty-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary-color);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }

        @media (max-width: 768px) {
            .navbar-inner { padding: 0 16px; }
            .nav-logo-text { display: none; }
            .nav-menu { display: none; }
            .main { padding: 24px 16px; }
            .article-card { flex-direction: column; }
            .article-rank { flex-direction: row; gap: 8px; margin-bottom: 12px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="nav-logo">
                <div class="nav-logo-icon">
                    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                </div>
                <span class="nav-logo-text">写作空间</span>
            </a>
            <div class="nav-menu">
                <a href="index.html" class="nav-item">首页</a>
                <a href="articles.html" class="nav-item">文章</a>
                <a href="hot.html" class="nav-item active">全站热文</a>
                <a href="create.html" class="nav-item">创作</a>
                <a href="collections.html" class="nav-item">收藏</a>
            </div>
            <div class="nav-actions">
                <div class="user-menu">
                    <div class="user-avatar" id="user-avatar"></div>
                    <div class="user-dropdown" id="user-dropdown">
                        <a href="profile.html" class="dropdown-item">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                            <span>个人中心</span>
                        </a>
                        <a href="profile.html" class="dropdown-item">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                            <span>设置</span>
                        </a>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-item" id="logout-btn">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                            <span>退出登录</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="main">
        <div class="page-header">
            <h1 class="page-title">全站热文 <span class="hot-badge"><svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67zM11.71 19c-1.78 0-3.22-1.4-3.22-3.14 0-1.62 1.05-2.76 2.81-3.12 1.77-.36 3.6-1.21 4.62-2.58.39 1.29.59 2.65.59 4.04 0 2.65-2.15 4.8-4.8 4.8z"/></svg>热门</span></h1>
            <p class="page-subtitle">根据阅读量和点赞数排序的热门文章</p>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="week">本周</button>
            <button class="filter-btn" data-filter="month">本月</button>
            <button class="filter-btn" data-filter="alltime">全部</button>
        </div>

        <div class="article-list" id="article-list">
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
        document.getElementById('user-avatar').textContent = userInfo.username ? userInfo.username.charAt(0).toUpperCase() : 'U';

        const API_BASE = 'http://localhost:3001/api';

        async function fetchHotArticles() {
            try {
                const response = await fetch(`${API_BASE}/articles`);
                const articles = await response.json();
                return articles.sort((a, b) => (b.views || 0) - (a.views || 0));
            } catch (error) {
                console.error('获取热文失败:', error);
                return getLocalHotArticles();
            }
        }

        function getLocalHotArticles() {
            return [
                { id: 1, title: '写作是一场与自己的对话', excerpt: '写作是一种表达思想的方式，也是与自己对话的过程。本文探讨了如何通过写作来提升思维能力...', author: '林间风声', views: 2340, likes: 89, date: '2小时前', tags: ['随笔', '思考'] },
                { id: 2, title: '如何写出有画面感的文字', excerpt: '文字的画面感是写作中非常重要的技巧，本文分享几种有效的方法...', author: '墨染流年', views: 1876, likes: 67, date: '昨天', tags: ['技巧', '教程'] },
                { id: 3, title: '阅读带给我的改变', excerpt: '阅读是写作的基础，让我分享一些阅读的心得体会...', author: '静水流深', views: 3456, likes: 123, date: '3天前', tags: ['阅读', '分享'] },
                { id: 4, title: '写给初学写作的人', excerpt: '写作并不可怕，可怕的是不敢开始。本文给初学者一些建议...', author: '林间风声', views: 5678, likes: 234, date: '2周前', tags: ['随笔', '建议'] },
                { id: 5, title: '我的读书方法论', excerpt: '如何高效阅读一本书，并从中获取写作的养分...', author: '时光笔记', views: 1234, likes: 45, date: '1周前', tags: ['方法', '阅读'] },
                { id: 6, title: '培养写作习惯的五个技巧', excerpt: '坚持写作需要方法，分享我是如何养成写作习惯的...', author: '墨染流年', views: 987, likes: 34, date: '5天前', tags: ['习惯', '方法'] },
                { id: 7, title: '写作中的情感表达', excerpt: '如何让文字更有感染力，触动读者的心...', author: '静水流深', views: 1567, likes: 78, date: '4天前', tags: ['技巧', '情感'] },
                { id: 8, title: '关于写作的一些思考', excerpt: '写作是一种生活方式，也是一种自我提升的方式...', author: '林间风声', views: 2100, likes: 92, date: '昨天', tags: ['随笔', '思考'] },
            ];
        }

        let currentFilter = 'all';
        let articles = [];

        async function renderArticles() {
            const list = document.getElementById('article-list');
            
            if (articles.length === 0) {
                articles = await fetchHotArticles();
            }

            let filtered = articles;
            if (currentFilter !== 'all') {
                filtered = articles.slice(0, 5);
            }

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                        </div>
                        <h3 class="empty-title">暂无热文</h3>
                        <p class="empty-desc">快去创作热门文章吧！</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map((article, index) => {
                const rankClass = index < 3 ? `top${index + 1}` : 'other';
                return `
                    <div class="article-card" data-id="${article._id || article.id}">
                        <div class="article-rank">
                            <span class="rank-number ${rankClass}">${index + 1}</span>
                            <span class="rank-label">${index < 3 ? '热榜' : '阅读'}</span>
                        </div>
                        <div class="article-content">
                            <div class="article-tags">
                                ${(article.tags || article.category || []).map(tag => `<span class="article-tag">${tag}</span>`).join('')}
                            </div>
                            <h3 class="article-title">${article.title || '无标题'}</h3>
                            <p class="article-excerpt">${article.excerpt || article.content?.substring(0, 100) || '暂无简介'}</p>
                            <div class="article-meta">
                                <div class="article-meta-info">
                                    <span class="article-meta-item">
                                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                                        ${article.author || '匿名'}
                                    </span>
                                    <span class="article-meta-item">
                                        <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/><path d="M12.5 7H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                                        ${article.date || '未知'}
                                    </span>
                                    <span class="article-meta-item">
                                        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                                        ${article.views || 0}
                                    </span>
                                </div>
                                <div class="article-actions">
                                    <button class="article-action-btn like-btn" data-id="${article._id || article.id}">
                                        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                        ${article.likes || 0}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderArticles();
            });
        });

        document.getElementById('user-avatar').addEventListener('click', () => {
            document.getElementById('user-dropdown').classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.user-menu')) {
                document.getElementById('user-dropdown').classList.remove('show');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userInfo');
            window.location.href = 'login.html';
        });

        renderArticles();
    </script>
</body>
</html>
