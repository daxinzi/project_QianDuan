<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创作 - 写作空间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #8b7355;
            --accent-color: #d4a574;
            --bg-color: #f5f3ef;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #6b7c8a;
            --border-color: #e8e4de;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
        }

        .navbar {
            background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .nav-logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-logo-icon svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .nav-logo-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            text-decoration: none;
        }

        .nav-btn-secondary {
            background: var(--bg-color);
            color: var(--text-secondary);
        }

        .nav-btn-secondary:hover {
            background: var(--border-color);
            color: var(--primary-color);
        }

        .nav-btn-primary {
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            color: white;
        }

        .nav-btn-primary:hover {
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.4);
            transform: translateY(-1px);
        }

        .editor-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .editor-title-input {
            width: 100%;
            border: none;
            background: transparent;
            font-family: 'Noto Serif SC', serif;
            font-size: 32px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 24px;
            outline: none;
        }

        .editor-title-input::placeholder {
            color: #c8ccd0;
        }

        .editor-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .meta-select {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            background: var(--card-bg);
            cursor: pointer;
            outline: none;
        }

        .meta-select:focus {
            border-color: var(--secondary-color);
        }

        .editor-toolbar {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            box-shadow: var(--shadow);
        }

        .toolbar-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .toolbar-btn:hover {
            background: var(--bg-color);
        }

        .toolbar-btn.active {
            background: var(--bg-color);
            color: var(--secondary-color);
        }

        .toolbar-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-secondary);
        }

        .toolbar-btn:hover svg {
            fill: var(--primary-color);
        }

        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: var(--border-color);
            margin: 6px 8px;
        }

        .editor-content {
            min-height: 500px;
            padding: 24px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            font-family: 'Noto Serif', 'Noto Serif SC', serif;
            font-size: 17px;
            line-height: 1.8;
            color: var(--text-primary);
            outline: none;
        }

        .editor-content:empty::before {
            content: '开始书写你的故事...';
            color: #c8ccd0;
        }

        .editor-content h1, .editor-content h2, .editor-content h3 {
            font-family: 'Noto Serif SC', serif;
            margin: 24px 0 16px;
        }

        .editor-content p {
            margin-bottom: 16px;
        }

        .editor-content blockquote {
            border-left: 4px solid var(--accent-color);
            padding-left: 16px;
            margin: 16px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        .word-count {
            text-align: right;
            padding: 16px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .auto-save {
            position: fixed;
            bottom: 24px;
            left: 24px;
            padding: 10px 16px;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--shadow);
            font-size: 13px;
            color: var(--text-secondary);
            opacity: 0;
            transition: var(--transition);
        }

        .auto-save.show {
            opacity: 1;
        }

        .publish-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .publish-modal.show {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            padding: 24px;
            transform: scale(0.9);
            transition: var(--transition);
        }

        .publish-modal.show .modal {
            transform: scale(1);
        }

        .modal-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .modal-body {
            margin-bottom: 24px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .modal-btn-cancel {
            background: var(--bg-color);
            color: var(--text-secondary);
        }

        .modal-btn-cancel:hover {
            background: var(--border-color);
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            color: white;
        }

        .modal-btn-primary:hover {
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.4);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary-color);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }

        @media (max-width: 768px) {
            .navbar-inner { padding: 0 16px; }
            .nav-logo-text { display: none; }
            .editor-container { padding: 24px 16px; }
            .editor-title-input { font-size: 24px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="nav-logo">
                <div class="nav-logo-icon">
                    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                </div>
                <span class="nav-logo-text">写作空间</span>
            </a>
            <div class="nav-actions">
                <button class="nav-btn nav-btn-secondary" id="draft-btn">保存草稿</button>
                <button class="nav-btn nav-btn-primary" id="publish-btn">发布</button>
            </div>
        </div>
    </nav>

    <div class="editor-container">
        <input type="text" class="editor-title-input" id="article-title" placeholder="请输入标题..." maxlength="100">
        
        <div class="editor-meta">
            <select class="meta-select" id="article-category">
                <option value="">选择分类</option>
                <option value="随笔">随笔</option>
                <option value="读书笔记">读书笔记</option>
                <option value="技巧分享">技巧分享</option>
                <option value="生活">生活</option>
                <option value="其他">其他</option>
            </select>
            <select class="meta-select" id="article-status">
                <option value="public">公开</option>
                <option value="private">私密</option>
            </select>
        </div>

        <div class="editor-toolbar">
            <button class="toolbar-btn" data-command="bold" title="粗体">
                <svg viewBox="0 0 24 24"><path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/></svg>
            </button>
            <button class="toolbar-btn" data-command="italic" title="斜体">
                <svg viewBox="0 0 24 24"><path d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"/></svg>
            </button>
            <button class="toolbar-btn" data-command="underline" title="下划线">
                <svg viewBox="0 0 24 24"><path d="M12 17c3.31 0 6-2.69 6-6V3h-2.5v8c0 1.93-1.57 3.5-3.5 3.5S8.5 12.93 8.5 11V3H6v8c0 3.31 2.69 6 6 6zm-7 2v2h14v-2H5z"/></svg>
            </button>
            <div class="toolbar-divider"></div>
            <button class="toolbar-btn" data-command="insertUnorderedList" title="无序列表">
                <svg viewBox="0 0 24 24"><path d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5S3.17 7.5 4 7.5 5.5 6.83 5.5 6 4.83 4.5 4 4.5zm0 12c-.83 0-1.5.68-1.5 1.5s.68 1.5 1.5 1.5 1.5-.68 1.5-1.5-.67-1.5-1.5-1.5zM7 19h14v-2H7v2zm0-6h14v-2H7v2zm0-8v2h14V5H7z"/></svg>
            </button>
            <button class="toolbar-btn" data-command="insertOrderedList" title="有序列表">
                <svg viewBox="0 0 24 24"><path d="M2 17h2v.5H3v1h1v.5H2v1h3v-4H2v1zm1-9h1V4H2v1h1v3zm-1 3h1.8L2 13.1v.9h3v-1H3.2L5 10.9V10H2v1zm5-6v2h14V5H7zm0 14h14v-2H7v2zm0-6h14v-2H7v2z"/></svg>
            </button>
            <div class="toolbar-divider"></div>
            <button class="toolbar-btn" data-command="formatBlock" data-value="blockquote" title="引用">
                <svg viewBox="0 0 24 24"><path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/></svg>
            </button>
            <button class="toolbar-btn" data-command="formatBlock" data-value="h2" title="标题">
                <svg viewBox="0 0 24 24"><path d="M5 4v3h5.5v12h3V7H19V4z"/></svg>
            </button>
            <div class="toolbar-divider"></div>
            <button class="toolbar-btn" data-command="removeFormat" title="清除格式">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>

        <div class="editor-content" id="editor-content" contenteditable="true"></div>

        <div class="word-count">
            字数：<span id="word-count">0</span>
        </div>
    </div>

    <div class="auto-save" id="auto-save">已自动保存</div>

    <div class="publish-modal" id="publish-modal">
        <div class="modal">
            <h3 class="modal-title">发布文章</h3>
            <div class="modal-body">
                <p style="margin-bottom: 12px; color: var(--text-secondary);">确定要发布这篇文章吗？</p>
                <p style="font-size: 14px; color: var(--text-secondary);">发布后将公开显示在你的文章列表中。</p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-cancel" id="modal-cancel">取消</button>
                <button class="modal-btn modal-btn-primary" id="modal-confirm">确认发布</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        const titleInput = document.getElementById('article-title');
        const editorContent = document.getElementById('editor-content');
        const wordCount = document.getElementById('word-count');
        const autoSave = document.getElementById('auto-save');

        // 字数统计
        function updateWordCount() {
            const text = editorContent.innerText || '';
            const count = text.replace(/\s/g, '').length;
            wordCount.textContent = count;
        }

        editorContent.addEventListener('input', updateWordCount);

        // 工具栏
        document.querySelectorAll('.toolbar-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const command = btn.dataset.command;
                const value = btn.dataset.value || null;
                
                document.execCommand(command, false, value);
                editorContent.focus();
                
                btn.classList.add('active');
                setTimeout(() => btn.classList.remove('active'), 200);
            });
        });

        // 自动保存
        let saveTimeout;
        function autoSaveDraft() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                const draft = {
                    title: titleInput.value,
                    content: editorContent.innerHTML,
                    category: document.getElementById('article-category').value,
                    status: document.getElementById('article-status').value,
                    savedAt: new Date().toISOString()
                };
                localStorage.setItem('currentDraft', JSON.stringify(draft));
                
                autoSave.classList.add('show');
                setTimeout(() => autoSave.classList.remove('show'), 2000);
            }, 2000);
        }

        titleInput.addEventListener('input', autoSaveDraft);
        editorContent.addEventListener('input', autoSaveDraft);
        document.getElementById('article-category').addEventListener('change', autoSaveDraft);
        document.getElementById('article-status').addEventListener('change', autoSaveDraft);

        // 加载草稿
        const savedDraft = JSON.parse(localStorage.getItem('currentDraft') || '{}');
        if (savedDraft.title) titleInput.value = savedDraft.title;
        if (savedDraft.content) editorContent.innerHTML = savedDraft.content;
        if (savedDraft.category) document.getElementById('article-category').value = savedDraft.category;
        if (savedDraft.status) document.getElementById('article-status').value = savedDraft.status;
        updateWordCount();

        // 保存草稿
        document.getElementById('draft-btn').addEventListener('click', () => {
            if (!titleInput.value) {
                showToast('请输入标题', 'error');
                return;
            }
            showToast('草稿已保存');
        });

        // 发布弹窗
        const publishModal = document.getElementById('publish-modal');
        
        document.getElementById('publish-btn').addEventListener('click', () => {
            if (!titleInput.value) {
                showToast('请输入标题', 'error');
                return;
            }
            if (!editorContent.innerText.trim()) {
                showToast('请输入内容', 'error');
                return;
            }
            publishModal.classList.add('show');
        });

        document.getElementById('modal-cancel').addEventListener('click', () => {
            publishModal.classList.remove('show');
        });

        document.getElementById('modal-confirm').addEventListener('click', () => {
            publishModal.classList.remove('show');
            showToast('文章发布成功！', 'success');
            
            // 清除草稿
            localStorage.removeItem('currentDraft');
            
            setTimeout(() => {
                window.location.href = 'articles.html';
            }, 1500);
        });

        publishModal.addEventListener('click', (e) => {
            if (e.target === publishModal) {
                publishModal.classList.remove('show');
            }
        });

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 键盘快捷键
        editorContent.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 's') {
                    e.preventDefault();
                    document.getElementById('draft-btn').click();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('publish-btn').click();
                }
            }
        });
    </script>
</body>
</html>
