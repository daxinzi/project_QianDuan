<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 - 写作空间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #8b7355;
            --accent-color: #d4a574;
            --bg-color: #f5f3ef;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #6b7c8a;
            --border-color: #e8e4de;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at top right, rgba(139, 115, 85, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at bottom left, rgba(212, 165, 116, 0.06) 0%, transparent 50%);
        }

        .navbar {
            background: var(--card-bg);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .nav-logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-logo-icon svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        .nav-logo-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-item {
            padding: 8px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            border-radius: 8px;
            transition: var(--transition);
        }

        .nav-item:hover {
            background: var(--bg-color);
            color: var(--primary-color);
        }

        .nav-item.active {
            background: var(--bg-color);
            color: var(--secondary-color);
            font-weight: 500;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-menu { position: relative; }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .user-avatar:hover { transform: scale(1.05); }

        .user-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
            min-width: 180px;
            padding: 8px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: var(--transition);
        }

        .user-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            color: var(--text-secondary);
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            background: none;
            width: 100%;
            text-decoration: none;
        }

        .dropdown-item:hover {
            background: var(--bg-color);
            color: var(--primary-color);
        }

        .dropdown-item svg {
            width: 18px;
            height: 18px;
        }

        .dropdown-divider {
            height: 1px;
            background: var(--border-color);
            margin: 8px 0;
        }

        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--secondary-color);
            border-color: var(--secondary-color);
            color: white;
        }

        .article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .article-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            cursor: pointer;
        }

        .article-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(139, 115, 85, 0.15);
        }

        .article-cover {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .article-cover svg {
            width: 48px;
            height: 48px;
            fill: rgba(255, 255, 255, 0.7);
        }

        .article-body {
            padding: 20px;
        }

        .article-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .article-tag {
            padding: 4px 10px;
            background: var(--bg-color);
            border-radius: 12px;
            font-size: 11px;
            color: var(--secondary-color);
        }

        .article-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-excerpt {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .article-meta-info {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .article-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .article-meta-item svg {
            width: 14px;
            height: 14px;
        }

        .article-actions {
            display: flex;
            gap: 8px;
        }

        .article-action-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-color);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .article-action-btn:hover {
            background: var(--border-color);
        }

        .article-action-btn svg {
            width: 16px;
            height: 16px;
            fill: var(--text-secondary);
        }

        .article-action-btn.liked svg {
            fill: #e74c3c;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 40px;
        }

        .page-btn {
            min-width: 36px;
            height: 36px;
            padding: 0 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-btn:hover, .page-btn.active {
            background: var(--secondary-color);
            border-color: var(--secondary-color);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: var(--bg-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--text-secondary);
        }

        .empty-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary-color);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }

        @media (max-width: 768px) {
            .navbar-inner { padding: 0 16px; }
            .nav-logo-text { display: none; }
            .nav-menu { display: none; }
            .main { padding: 24px 16px; }
            .article-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="nav-logo">
                <div class="nav-logo-icon">
                    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                </div>
                <span class="nav-logo-text">写作空间</span>
            </a>
            <div class="nav-menu">
                <a href="index.html" class="nav-item">首页</a>
                <a href="articles.html" class="nav-item active">文章</a>
                <a href="create.html" class="nav-item">创作</a>
                <a href="collections.html" class="nav-item">收藏</a>
            </div>
            <div class="nav-actions">
                <div class="user-menu">
                    <div class="user-avatar" id="user-avatar"></div>
                    <div class="user-dropdown" id="user-dropdown">
                        <a href="profile.html" class="dropdown-item">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                            <span>个人中心</span>
                        </a>
                        <a href="profile.html" class="dropdown-item">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                            <span>设置</span>
                        </a>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-item" id="logout-btn">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                            <span>退出登录</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="main">
        <div class="page-header">
            <h1 class="page-title">全部文章</h1>
            <p class="page-subtitle">浏览创作的每一篇文字</p>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="published">已发布</button>
            <button class="filter-btn" data-filter="draft">草稿</button>
            <button class="filter-btn" data-filter="private">私密</button>
        </div>

        <div class="article-grid" id="article-grid">
        </div>

        <div class="pagination" id="pagination">
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
        document.getElementById('user-avatar').textContent = userInfo.username ? userInfo.username.charAt(0).toUpperCase() : 'U';

        // 模拟文章数据
        const articles = [
            { id: 1, title: '关于写作的一些思考', excerpt: '写作是一种表达思想的方式，也是与自己对话的过程。本文探讨了如何通过写作来提升思维能力...', status: 'published', date: '2小时前', views: 1200, likes: 45, tags: ['随笔', '思考'] },
            { id: 2, title: '写作技巧分享：如何写出吸引人的开头', excerpt: '开头是文章的门面，一个好的开头能够吸引读者继续往下读。本文分享几种有效的写作开头技巧...', status: 'published', date: '昨天', views: 856, likes: 32, tags: ['技巧', '教程'] },
            { id: 3, title: '草稿：散文两则', excerpt: '（草稿未完成）', status: 'draft', date: '3天前', views: 0, likes: 0, tags: ['散文', '草稿'] },
            { id: 4, title: '读书笔记：《活着》读后感', excerpt: '余华的《活着》讲述了一个普通人一生的故事，通过福贵的经历，我们看到了生命的坚韧与脆弱...', status: 'published', date: '1周前', views: 2340, likes: 89, tags: ['读书笔记', '文学'] },
            { id: 5, title: '我的2024年写作计划', excerpt: '新的一年到了，给自己制定一个写作计划。希望能在这一年里完成更多优质的文章...', status: 'private', date: '2周前', views: 0, likes: 0, tags: ['计划', '随笔'] },
            { id: 6, title: '如何培养写作习惯', excerpt: '写作需要坚持，需要养成习惯。本文分享一些培养写作习惯的小技巧，帮助你更好地坚持写作...', status: 'published', date: '3周前', views: 1567, likes: 67, tags: ['习惯', '方法'] },
        ];

        let currentFilter = 'all';
        let currentPage = 1;
        const pageSize = 6;

        function renderArticles() {
            const grid = document.getElementById('article-grid');
            const filtered = currentFilter === 'all' ? articles : articles.filter(a => a.status === currentFilter);
            const start = (currentPage - 1) * pageSize;
            const paginated = filtered.slice(start, start + pageSize);

            grid.innerHTML = paginated.map(article => `
                <div class="article-card" data-id="${article.id}">
                    <div class="article-cover">
                        <svg viewBox="0 0 24 24"><path d="M14.06 9.02l.92.92L5.92 19H5v-.92l9.06-9.06M17.66 3c-.25 0-.51.1-.7.29l-1.83 1.83 3.75 3.75 1.83-1.83c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.2-.2-.45-.29-.71-.29zm-3.6 3.19L3 17.25V21h3.75L17.81 9.94l-3.75-3.75z"/></svg>
                    </div>
                    <div class="article-body">
                        <div class="article-tags">
                            ${article.tags.map(tag => `<span class="article-tag">${tag}</span>`).join('')}
                        </div>
                        <h3 class="article-title">${article.title}</h3>
                        <p class="article-excerpt">${article.excerpt}</p>
                        <div class="article-meta">
                            <div class="article-meta-info">
                                <span class="article-meta-item">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/><path d="M12.5 7H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                                    ${article.date}
                                </span>
                                <span class="article-meta-item">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                                    ${article.views}
                                </span>
                            </div>
                            <div class="article-actions">
                                <button class="article-action-btn like-btn" data-id="${article.id}">
                                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            // 渲染分页
            const totalPages = Math.ceil(filtered.length / pageSize);
            const pagination = document.getElementById('pagination');
            let pageHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                pageHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            }
            pagination.innerHTML = pageHtml;

            // 分页点击
            pagination.querySelectorAll('.page-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentPage = parseInt(btn.dataset.page);
                    renderArticles();
                });
            });
        }

        // 筛选
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                currentPage = 1;
                renderArticles();
            });
        });

        // 点赞
        document.addEventListener('click', (e) => {
            const likeBtn = e.target.closest('.like-btn');
            if (likeBtn) {
                likeBtn.classList.toggle('liked');
                showToast(likeBtn.classList.contains('liked') ? '已点赞' : '取消点赞');
            }
        });

        // 用户菜单
        const userAvatar = document.getElementById('user-avatar');
        const userDropdown = document.getElementById('user-dropdown');
        userAvatar.addEventListener('click', () => userDropdown.classList.toggle('show'));
        document.addEventListener('click', (e) => {
            if (!userAvatar.contains(e.target) && !userDropdown.contains(e.target)) {
                userDropdown.classList.remove('show');
            }
        });

        // 退出登录
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userInfo');
            showToast('已退出登录');
            setTimeout(() => window.location.href = 'login.html', 1000);
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        renderArticles();
    </script>
</body>
</html>
